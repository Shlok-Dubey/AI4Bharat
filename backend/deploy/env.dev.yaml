# Development Environment Configuration
# Used for local development and testing

environment: development

aws:
  region: us-east-1
  account_id: "123456789012"  # Replace with your dev account

dynamodb:
  endpoint: http://localhost:8000  # DynamoDB Local
  users_table: postpilot-dev-users
  products_table: postpilot-dev-products
  campaigns_table: postpilot-dev-campaigns
  analytics_table: postpilot-dev-analytics
  memory_table: postpilot-dev-memory
  rate_limits_table: postpilot-dev-rate-limits

s3:
  endpoint: http://localhost:4566  # LocalStack
  bucket_name: postpilot-dev-media

sqs:
  endpoint: http://localhost:4566  # LocalStack
  queue_url: http://localhost:4566/000000000000/postpilot-dev-queue

bedrock:
  model_id: anthropic.claude-3-5-sonnet-20241022-v2:0
  region: us-east-1
  connection_timeout: 5
  response_timeout: 15

instagram:
  client_id: dev_instagram_client_id
  client_secret: dev_instagram_client_secret
  redirect_uri: http://localhost:8000/api/v1/instagram/callback
  api_version: v18.0

jwt:
  secret_key: dev-jwt-secret-key-not-for-production
  access_token_expire: 3600
  refresh_token_expire: 604800

rate_limiting:
  requests_per_minute: 100
  daily_campaign_quota: 50

logging:
  level: DEBUG
  structured: true
  trace_enabled: true

features:
  use_local_aws: true
  mock_external_apis: true
