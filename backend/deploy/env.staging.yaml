# Staging Environment Configuration
# Used for pre-production testing

environment: staging

aws:
  region: us-east-1
  account_id: "123456789012"  # Replace with your staging account

dynamodb:
  users_table: postpilot-staging-users
  products_table: postpilot-staging-products
  campaigns_table: postpilot-staging-campaigns
  analytics_table: postpilot-staging-analytics
  memory_table: postpilot-staging-memory
  rate_limits_table: postpilot-staging-rate-limits

s3:
  bucket_name: postpilot-staging-media

sqs:
  queue_url: https://sqs.us-east-1.amazonaws.com/123456789012/postpilot-staging-queue

bedrock:
  model_id: anthropic.claude-3-5-sonnet-20241022-v2:0
  region: us-east-1
  connection_timeout: 5
  response_timeout: 15

instagram:
  client_id: staging_instagram_client_id
  client_secret: staging_instagram_client_secret
  redirect_uri: https://staging.postpilot.ai/api/v1/instagram/callback
  api_version: v18.0

jwt:
  secret_key: staging-jwt-secret-key  # Store in Secrets Manager
  access_token_expire: 3600
  refresh_token_expire: 604800

rate_limiting:
  requests_per_minute: 100
  daily_campaign_quota: 50

logging:
  level: INFO
  structured: true
  trace_enabled: true

features:
  use_local_aws: false
  mock_external_apis: false
