# Production Environment Configuration
# Used for production deployment

environment: production

aws:
  region: us-east-1
  account_id: "123456789012"  # Replace with your production account

dynamodb:
  users_table: postpilot-users
  products_table: postpilot-products
  campaigns_table: postpilot-campaigns
  analytics_table: postpilot-analytics
  memory_table: postpilot-memory
  rate_limits_table: postpilot-rate-limits

s3:
  bucket_name: postpilot-media

sqs:
  queue_url: https://sqs.us-east-1.amazonaws.com/123456789012/postpilot-publishing-queue

bedrock:
  model_id: anthropic.claude-3-5-sonnet-20241022-v2:0
  region: us-east-1
  connection_timeout: 5
  response_timeout: 15

instagram:
  # Store credentials in AWS Secrets Manager
  client_id: ${INSTAGRAM_CLIENT_ID}  # Retrieved from Secrets Manager
  client_secret: ${INSTAGRAM_CLIENT_SECRET}  # Retrieved from Secrets Manager
  redirect_uri: https://app.postpilot.ai/api/v1/instagram/callback
  api_version: v18.0

jwt:
  # Store secret in AWS Secrets Manager
  secret_key: ${JWT_SECRET_KEY}  # Retrieved from Secrets Manager
  access_token_expire: 3600
  refresh_token_expire: 604800

rate_limiting:
  requests_per_minute: 100
  daily_campaign_quota: 50

logging:
  level: INFO
  structured: true
  trace_enabled: true

features:
  use_local_aws: false
  mock_external_apis: false

# Production-specific settings
monitoring:
  enable_xray: true
  enable_detailed_metrics: true
  alarm_email: ops@postpilot.ai

security:
  enforce_https: true
  enable_waf: true
  enable_shield: false  # Optional DDoS protection
