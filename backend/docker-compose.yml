version: '3.8'

services:
  # DynamoDB Local for local development
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: postpilot-dynamodb-local
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath ./data"
    volumes:
      - dynamodb-data:/home/dynamodblocal/data
    networks:
      - postpilot-network

  # LocalStack for S3, SQS, and other AWS services
  localstack:
    image: localstack/localstack:latest
    container_name: postpilot-localstack
    ports:
      - "4566:4566"  # LocalStack gateway
      - "4571:4571"  # LocalStack edge port
    environment:
      - SERVICES=s3,sqs,secretsmanager
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - localstack-data:/tmp/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - postpilot-network

  # DynamoDB Admin UI (optional - for viewing tables)
  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: postpilot-dynamodb-admin
    ports:
      - "8001:8001"
    environment:
      - DYNAMO_ENDPOINT=http://dynamodb-local:8000
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
    depends_on:
      - dynamodb-local
    networks:
      - postpilot-network

volumes:
  dynamodb-data:
    driver: local
  localstack-data:
    driver: local

networks:
  postpilot-network:
    driver: bridge
